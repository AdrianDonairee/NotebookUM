version: '3.8'

services:
  postgresql:
    image: postgres:16-alpine
    container_name: notebookum_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: notebookum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notebookum_network

volumes:
  postgres_data:

networks:
  notebookum_network:
    driver: bridge
